name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Download iOS simulator
        run: xcodebuild -downloadPlatform iOS

      - name: Run tests
        run: |
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json; devs=json.load(sys.stdin)['devices']; print(next(d['name'] for r in sorted(devs,reverse=True) for d in devs[r] if 'iPhone' in d['name'] and d['isAvailable']))")
          echo "Using simulator: $DEST"
          xcodebuild test \
            -project POILog.xcodeproj \
            -scheme POILog \
            -destination "platform=iOS Simulator,name=$DEST" \
            -derivedDataPath .deriveddata
